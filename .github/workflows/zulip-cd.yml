name: Deploy Zulip

on:
  push:
    branches: [ dev ]         # change if you deploy from another branch
    paths-ignore:
      - "README.md"
      - ".github/**"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch/tag/commit to deploy (defaults to pushed ref)"
        required: false
        default: ""
      health_timeout:
        description: "Health check timeout (seconds)"
        required: false
        default: "60"

permissions:
  contents: read

concurrency:
  group: zulip-prod-deploy
  cancel-in-progress: true

env:
  ZULIP_DEPLOY_DIR: /home/zulip/deployments/current
  # Set to your public hostname (the same value as EXTERNAL_HOST in settings.py)
  ZULIP_HOST: dev.zulip.xandylearning.in

jobs:
  deploy:
    runs-on: [self-hosted]
    timeout-minutes: 45
    
    defaults:
      run:
        shell: bash

    steps:
      - name: Show trigger
        run: |
          echo "Triggered by: $GITHUB_EVENT_NAME"
          echo "Repo: $GITHUB_REPOSITORY"
          echo "Ref from event: $GITHUB_REF_NAME"

      - name: Determine ref to deploy
        id: pickref
        run: |
          REF_INPUT="${{ github.event.inputs.ref }}"
          if [[ -n "$REF_INPUT" ]]; then
            echo "ref=$REF_INPUT" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
          echo "Deploying ref: $(cat $GITHUB_OUTPUT)"

      # We don't deploy the checked-out code; Zulip's script pulls from git_repo_url on the server.
      # Still, checkout keeps the run familiar and allows future steps to read repo files if needed.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy from fork via Zulip script
        run: |
          set -euo pipefail
          REF="${{ steps.pickref.outputs.ref }}"
          echo "Starting upgrade-zulip-from-git $REF"
          sudo ${ZULIP_DEPLOY_DIR}/scripts/upgrade-zulip-from-git "$REF" | sudo tee /tmp/zulip_upgrade.log
          echo "Upgrade script finished."

      - name: Process health (supervisor)
        run: |
          set -e
          sudo supervisorctl status
          # Fail if any core services are not RUNNING
          bad=$(sudo supervisorctl status | awk '$2!="RUNNING"{print}')
          if [[ -n "$bad" ]]; then
            echo "Some processes not RUNNING:"
            echo "$bad"
            exit 1
          fi

      - name: HTTP health check
        run: |
          set -euo pipefail
          timeout="${{ github.event.inputs.health_timeout || '60' }}"
          echo "HTTP health timeout: $timeout seconds"
          end=$((SECONDS + timeout))
          ok=0
          # Try homepage and a public static file
          while (( SECONDS < end )); do
            if curl -fsS -k "https://127.0.0.1/" >/dev/null 2>&1 \
            && curl -fsS -k "https://127.0.0.1/static/version.json" >/dev/null 2>&1; then
              ok=1; break
            fi
            sleep 2
          done
          if [[ "$ok" -ne 1 ]]; then
            echo "HTTP health check failed"
            exit 1
          fi
          echo "HTTP health check passed."

      - name: Save upgrade log (artifact-like to job log)
        if: always()
        run: |
          echo "::group::/var/log/zulip/upgrade.log (tail)"
          sudo tail -n 200 /var/log/zulip/upgrade.log || true
          echo "::endgroup::"
          echo "::group::/tmp/zulip_upgrade.log"
          sudo cat /tmp/zulip_upgrade.log || true
          echo "::endgroup::"

      - name: Rollback on failure
        if: failure()
        run: |
          set -euo pipefail
          echo "Rolling back to previous deployment..."
          prev=$(ls -1dt /home/zulip/deployments/* | sed -n '2p' || true)
          if [[ -z "$prev" ]]; then
            echo "No previous deployment found; cannot rollback."
            exit 1
          fi
          echo "Switching 'current' symlink to: $prev"
          sudo ln -sfn "$prev" /home/zulip/deployments/current
          sudo ${prev}/scripts/restart-server
          sudo supervisorctl status
          echo "Rollback attempted."
