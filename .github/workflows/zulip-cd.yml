name: Deploy Zulip on Self-Hosted Runner VM

on:
  push:
    branches: [ dev ]
    paths-ignore: [ 'docs/**', 'help/**', 'locale/**' ]
  pull_request:
    branches: [ dev ]
    paths-ignore: [ 'docs/**', 'help/**', 'locale/**' ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - staging
        - development
      action:
        description: 'Deployment action'
        required: true
        default: 'deploy'
        type: choice
        options:
        - deploy
        - update
        - rollback
        - health-check

env:
  ZULIP_VERSION: '7.0'
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  deploy:
    name: 'Deploy Zulip'
    runs-on: self-hosted
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          libffi-dev \
          libssl-dev \
          libjpeg-dev \
          libfreetype6-dev \
          liblcms2-dev \
          libwebp-dev \
          libopenjp2-7-dev \
          libtiff5-dev \
          libpq-dev \
          postgresql-client \
          redis-server \
          rabbitmq-server \
          memcached \
          nginx \
          certbot \
          python3-certbot-nginx \
          git \
          curl \
          wget \
          unzip \
          jq \
          supervisor

    - name: Create zulip user
      run: |
        sudo useradd -m -s /bin/bash zulip || true
        sudo usermod -aG sudo zulip
        echo "zulip user created/updated"

    - name: Create directories
      run: |
        sudo mkdir -p /home/zulip/zulip-server
        sudo mkdir -p /etc/zulip
        sudo mkdir -p /var/log/zulip
        sudo mkdir -p /var/lib/zulip
        sudo mkdir -p /home/zulip/uploads
        sudo mkdir -p /var/backups/zulip
        sudo chown -R zulip:zulip /home/zulip
        sudo chown -R zulip:zulip /var/log/zulip
        sudo chown -R zulip:zulip /var/lib/zulip
        sudo chown -R zulip:zulip /var/backups/zulip

    - name: Install Python dependencies
      run: |
        sudo -u zulip python3 -m pip install --user --upgrade pip
        sudo -u zulip python3 -m pip install --user virtualenv

    - name: Setup Zulip environment
      run: |
        cd /home/zulip
        sudo -u zulip python3 -m venv zulip-py3-venv
        sudo -u zulip /home/zulip/zulip-py3-venv/bin/pip install --upgrade pip

    - name: Copy Zulip code
      run: |
        sudo cp -r . /home/zulip/zulip-server/
        sudo chown -R zulip:zulip /home/zulip/zulip-server

    - name: Install Zulip dependencies
      run: |
        cd /home/zulip/zulip-server
        sudo -u zulip /home/zulip/zulip-py3-venv/bin/pip install -r requirements/prod.txt
        sudo -u zulip /home/zulip/zulip-py3-venv/bin/pip install -r requirements/dev.txt

    - name: Install Node.js dependencies
      run: |
        cd /home/zulip/zulip-server
        sudo -u zulip npm install
        sudo -u zulip npm run build

    - name: Configure Zulip settings
      run: |
        sudo tee /etc/zulip/settings.py > /dev/null << 'EOF'
        # Zulip settings for VM deployment with hosted PostgreSQL
        import os
        from pathlib import Path

        # Basic settings
        EXTERNAL_HOST = '${{ secrets.ZULIP_EXTERNAL_HOST || 'localhost' }}'
        EXTERNAL_URI_SCHEME = '${{ secrets.ZULIP_URI_SCHEME || 'http' }}'

        # Database configuration (hosted PostgreSQL)
        DATABASES = {
            'default': {
                'ENGINE': 'django.db.backends.postgresql',
                'NAME': '${{ secrets.DB_NAME }}',
                'USER': '${{ secrets.DB_USER }}',
                'PASSWORD': '${{ secrets.DB_PASSWORD }}',
                'HOST': '${{ secrets.DB_HOST }}',
                'PORT': '${{ secrets.DB_PORT || '5432' }}',
                'OPTIONS': {
                    'sslmode': '${{ secrets.DB_SSL_MODE || 'require' }}',
                },
            }
        }

        # Email configuration
        EMAIL_BACKEND = 'django.core.mail.backends.smtp.EmailBackend'
        EMAIL_HOST = '${{ secrets.EMAIL_HOST }}'
        EMAIL_PORT = ${{ secrets.EMAIL_PORT || '587' }}
        EMAIL_USE_TLS = ${{ secrets.EMAIL_USE_TLS || 'True' }}
        EMAIL_HOST_USER = '${{ secrets.EMAIL_HOST_USER }}'
        EMAIL_HOST_PASSWORD = '${{ secrets.EMAIL_HOST_PASSWORD }}'
        DEFAULT_FROM_EMAIL = '${{ secrets.DEFAULT_FROM_EMAIL }}'

        # File uploads
        LOCAL_UPLOADS_DIR = '/home/zulip/uploads'

        # Security
        SECRET_KEY = '${{ secrets.ZULIP_SECRET_KEY }}'
        ALLOWED_HOSTS = ['localhost', '127.0.0.1', '${{ secrets.ZULIP_EXTERNAL_HOST || 'localhost' }}']

        # Production settings
        DEBUG = ${{ secrets.ZULIP_DEBUG || 'False' }}
        TEMPLATE_DEBUG = ${{ secrets.ZULIP_TEMPLATE_DEBUG || 'False' }}

        # Static files
        STATIC_ROOT = '/home/zulip/zulip-server/staticfiles'
        STATIC_URL = '/static/'

        # Media files
        MEDIA_ROOT = '/home/zulip/uploads'
        MEDIA_URL = '/user_uploads/'

        # Cache
        CACHES = {
            'default': {
                'BACKEND': 'django.core.cache.backends.redis.RedisCache',
                'LOCATION': 'redis://:zulip@127.0.0.1:6379/1',
            }
        }

        # Session
        SESSION_ENGINE = 'django.contrib.sessions.backends.db'
        SESSION_COOKIE_SECURE = ${{ secrets.SESSION_COOKIE_SECURE || 'False' }}
        CSRF_COOKIE_SECURE = ${{ secrets.CSRF_COOKIE_SECURE || 'False' }}

        # Time zone
        TIME_ZONE = '${{ secrets.TIME_ZONE || 'UTC' }}'
        USE_TZ = True

        # Language
        LANGUAGE_CODE = '${{ secrets.LANGUAGE_CODE || 'en-us' }}'
        USE_I18N = True
        USE_L10N = True

        # Installed apps
        INSTALLED_APPS = [
            'django.contrib.admin',
            'django.contrib.auth',
            'django.contrib.contenttypes',
            'django.contrib.sessions',
            'django.contrib.messages',
            'django.contrib.staticfiles',
            'zerver',
            'analytics',
            'corporate',
            'confirmation',
            'zilencer',
            'pgroonga',
        ]

        # Middleware
        MIDDLEWARE = [
            'django.middleware.security.SecurityMiddleware',
            'django.contrib.sessions.middleware.SessionMiddleware',
            'django.middleware.common.CommonMiddleware',
            'django.middleware.csrf.CsrfViewMiddleware',
            'django.contrib.auth.middleware.AuthenticationMiddleware',
            'django.contrib.messages.middleware.MessageMiddleware',
            'django.middleware.clickjacking.XFrameOptionsMiddleware',
        ]

        # Root URL configuration
        ROOT_URLCONF = 'zproject.urls'

        # Template configuration
        TEMPLATES = [
            {
                'BACKEND': 'django.template.backends.django.DjangoTemplates',
                'DIRS': [],
                'APP_DIRS': True,
                'OPTIONS': {
                    'context_processors': [
                        'django.template.context_processors.debug',
                        'django.template.context_processors.request',
                        'django.contrib.auth.context_processors.auth',
                        'django.contrib.messages.context_processors.messages',
                    ],
                },
            },
        ]

        # WSGI application
        WSGI_APPLICATION = 'zproject.wsgi.application'

        # Password validation
        AUTH_PASSWORD_VALIDATORS = [
            {
                'NAME': 'django.contrib.auth.password_validation.UserAttributeSimilarityValidator',
            },
            {
                'NAME': 'django.contrib.auth.password_validation.MinimumLengthValidator',
            },
            {
                'NAME': 'django.contrib.auth.password_validation.CommonPasswordValidator',
            },
            {
                'NAME': 'django.contrib.auth.password_validation.NumericPasswordValidator',
            },
        ]

        # Static files (CSS, JavaScript, Images)
        STATIC_URL = '/static/'
        STATIC_ROOT = os.path.join(BASE_DIR, 'staticfiles')

        # Default primary key field type
        DEFAULT_AUTO_FIELD = 'django.db.models.BigAutoField'

        # Zulip specific settings
        ZULIP_WORKER_TEST_FILE = '/tmp/zulip-worker-test-file'
        ZULIP_WORKER_TEST_FILE_2 = '/tmp/zulip-worker-test-file-2'

        # Development settings
        DEVELOPMENT = False
        TEST_SUITE = False

        # RabbitMQ settings
        USING_RABBITMQ = True
        RABBITMQ_PASSWORD = 'zulip1133'

        # Memcached settings
        MEMCACHED_PASSWORD = 'zulip1133'

        # Redis settings
        REDIS_PASSWORD = 'zulip1133'

        # Camo settings
        CAMO_URI = '${{ secrets.CAMO_URI || 'https://external-content.zulipcdn.net/external_content/' }}'
        CAMO_KEY = '${{ secrets.CAMO_KEY }}'

        # Push notifications
        PUSH_NOTIFICATION_BOUNCER_URL = '${{ secrets.PUSH_NOTIFICATION_BOUNCER_URL || 'https://push.zulipchat.com' }}'

        # Mobile push notifications
        MOBILE_PUSH_NOTIFICATION_BOUNCER_URL = '${{ secrets.MOBILE_PUSH_NOTIFICATION_BOUNCER_URL || 'https://push.zulipchat.com' }}'

        # Analytics
        ANALYTICS_ENABLED = ${{ secrets.ANALYTICS_ENABLED || 'True' }}

        # Corporate settings
        CORPORATE_ENABLED = ${{ secrets.CORPORATE_ENABLED || 'True' }}

        # Billing
        BILLING_ENABLED = ${{ secrets.BILLING_ENABLED || 'False' }}

        # Cloud deployment
        CLOUD_DEPLOYMENT = False

        # SSL/TLS settings
        SSL_CERT_FILE = '${{ secrets.SSL_CERT_FILE || '' }}'
        SSL_KEY_FILE = '${{ secrets.SSL_KEY_FILE || '' }}'
        EOF

    - name: Create zulip-secrets.conf
      run: |
        sudo tee /etc/zulip/zulip-secrets.conf > /dev/null << 'EOF'
        [secrets]
        secret_key = ${{ secrets.ZULIP_SECRET_KEY }}
        postgres_password = ${{ secrets.DB_PASSWORD }}
        rabbitmq_password = zulip1133
        memcached_password = zulip1133
        redis_password = zulip1133
        camo_key = ${{ secrets.CAMO_KEY }}
        email_password = ${{ secrets.EMAIL_HOST_PASSWORD }}
        ssl_cert = ${{ secrets.SSL_CERT_FILE || '' }}
        ssl_key = ${{ secrets.SSL_KEY_FILE || '' }}
        EOF

    - name: Configure Redis with password
      run: |
        # Configure Redis with password
        sudo sed -i 's/# requirepass foobared/requirepass zulip1133/' /etc/redis/redis.conf
        sudo systemctl restart redis-server

    - name: Configure RabbitMQ with password
      run: |
        # Start RabbitMQ service first
        sudo systemctl start rabbitmq-server
        sudo systemctl enable rabbitmq-server
        
        # Wait for RabbitMQ to be ready
        sleep 10
        
        # Configure RabbitMQ with password
        sudo rabbitmqctl add_user zulip zulip1133 || true
        sudo rabbitmqctl set_permissions -p / zulip ".*" ".*" ".*" || true
        sudo rabbitmqctl set_user_tags zulip administrator || true

    - name: Configure Memcached with password
      run: |
        # Install SASL for Memcached authentication
        sudo apt-get install -y libsasl2-2 libsasl2-modules sasl2-bin
        
        # Create SASL configuration for Memcached
        sudo tee /etc/sasl2/memcached.conf > /dev/null << 'EOF'
        mech_list: plain
        log_level: 5
        sasldb_path: /etc/sasl2/memcached-sasldb2
        EOF
        
        # Create SASL user for Memcached
        echo 'zulip1133' | sudo saslpasswd2 -a memcached -c zulip -p
        
        # Configure Memcached to use SASL
        sudo tee /etc/memcached.conf > /dev/null << 'EOF'
        # memcached default config file
        #  -m 64
        -m 128
        -p 11211
        -u memcache
        -l 127.0.0.1
        -S
        EOF
        
        sudo systemctl restart memcached

    - name: Test database connection
      run: |
        PGPASSWORD='${{ secrets.DB_PASSWORD }}' psql -h '${{ secrets.DB_HOST }}' -p '${{ secrets.DB_PORT || '5432' }}' -U '${{ secrets.DB_USER }}' -d '${{ secrets.DB_NAME }}' -c "SELECT version();"

    - name: Initialize database
      run: |
        cd /home/zulip/zulip-server
        sudo -u zulip /home/zulip/zulip-py3-venv/bin/python manage.py migrate
        sudo -u zulip /home/zulip/zulip-py3-venv/bin/python manage.py collectstatic --noinput

    - name: Configure nginx
      run: |
        sudo tee /etc/nginx/sites-available/zulip > /dev/null << 'EOF'
        server {
            listen 80;
            server_name ${{ secrets.ZULIP_EXTERNAL_HOST || 'localhost' }};
            
            # Redirect HTTP to HTTPS if SSL is configured
            if (${{ secrets.ZULIP_URI_SCHEME || 'http' }} = 'https') {
                return 301 https://$server_name$request_uri;
            }
            
            location /static/ {
                alias /home/zulip/zulip-server/staticfiles/;
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
            
            location /user_uploads/ {
                alias /home/zulip/uploads/;
                expires 1y;
                add_header Cache-Control "public";
            }
            
            location / {
                proxy_pass http://127.0.0.1:8000;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }
        }
        
        # HTTPS server block (if SSL is configured)
        server {
            listen 443 ssl http2;
            server_name ${{ secrets.ZULIP_EXTERNAL_HOST || 'localhost' }};
            
            ssl_certificate ${{ secrets.SSL_CERT_FILE || '/etc/ssl/certs/zulip.crt' }};
            ssl_certificate_key ${{ secrets.SSL_KEY_FILE || '/etc/ssl/private/zulip.key' }};
            
            ssl_protocols TLSv1.2 TLSv1.3;
            ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
            ssl_prefer_server_ciphers off;
            
            # Security headers
            add_header X-Frame-Options DENY;
            add_header X-Content-Type-Options nosniff;
            add_header X-XSS-Protection "1; mode=block";
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            
            location /static/ {
                alias /home/zulip/zulip-server/staticfiles/;
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
            
            location /user_uploads/ {
                alias /home/zulip/uploads/;
                expires 1y;
                add_header Cache-Control "public";
            }
            
            location / {
                proxy_pass http://127.0.0.1:8000;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }
        }
        EOF

    - name: Enable nginx site
      run: |
        sudo ln -sf /etc/nginx/sites-available/zulip /etc/nginx/sites-enabled/
        sudo rm -f /etc/nginx/sites-enabled/default
        sudo nginx -t

    - name: Create systemd service
      run: |
        sudo tee /etc/systemd/system/zulip.service > /dev/null << 'EOF'
        [Unit]
        Description=Zulip Server
        After=network.target redis-server.service rabbitmq-server.service memcached.service

        [Service]
        Type=simple
        User=zulip
        Group=zulip
        WorkingDirectory=/home/zulip/zulip-server
        Environment=DJANGO_SETTINGS_MODULE=zproject.settings
        ExecStart=/home/zulip/zulip-py3-venv/bin/python manage.py runserver 0.0.0.0:8000
        Restart=always
        RestartSec=10

        [Install]
        WantedBy=multi-user.target
        EOF

    - name: Start services
      run: |
        sudo systemctl daemon-reload
        sudo systemctl enable zulip
        sudo systemctl enable nginx
        sudo systemctl enable redis-server
        sudo systemctl enable rabbitmq-server
        sudo systemctl enable memcached
        sudo systemctl start redis-server
        sudo systemctl start rabbitmq-server
        sudo systemctl start memcached
        sudo systemctl start zulip
        sudo systemctl start nginx

    - name: Create admin user
      run: |
        cd /home/zulip/zulip-server
        echo "from django.contrib.auth import get_user_model; User = get_user_model(); User.objects.create_superuser('${{ secrets.ADMIN_USERNAME || 'admin' }}', '${{ secrets.ADMIN_EMAIL || 'admin@localhost' }}', '${{ secrets.ADMIN_PASSWORD || 'admin123' }}') if not User.objects.filter(username='${{ secrets.ADMIN_USERNAME || 'admin' }}').exists() else None" | sudo -u zulip /home/zulip/zulip-py3-venv/bin/python manage.py shell

    - name: Health check
      run: |
        sleep 10
        curl -f ${{ secrets.ZULIP_URI_SCHEME || 'http' }}://${{ secrets.ZULIP_EXTERNAL_HOST || 'localhost' }}/ || exit 1
        echo "Zulip is running successfully!"

    - name: Create backup script
      run: |
        sudo tee /usr/local/bin/zulip-backup > /dev/null << 'EOF'
        #!/bin/bash
        BACKUP_DIR="/var/backups/zulip"
        DATE=$(date +%Y%m%d_%H%M%S)
        BACKUP_FILE="zulip_backup_$DATE.tar.gz"
        
        mkdir -p $BACKUP_DIR
        
        cd /home/zulip/zulip-server
        sudo -u zulip /home/zulip/zulip-py3-venv/bin/python manage.py backup --output=$BACKUP_DIR/$BACKUP_FILE
        
        # Clean up old backups (keep last 7 days)
        find $BACKUP_DIR -name "zulip_backup_*.tar.gz" -mtime +7 -delete
        
        echo "Backup completed: $BACKUP_FILE"
        EOF
        sudo chmod +x /usr/local/bin/zulip-backup

    - name: Setup backup cron job
      run: |
        echo "0 2 * * * /usr/local/bin/zulip-backup" | sudo crontab -

    - name: Create health check script
      run: |
        sudo tee /usr/local/bin/zulip-health-check > /dev/null << 'EOF'
        #!/bin/bash
        HEALTH_URL="${{ secrets.ZULIP_URI_SCHEME || 'http' }}://${{ secrets.ZULIP_EXTERNAL_HOST || 'localhost' }}/health"
        LOG_FILE="/var/log/zulip/health-check.log"
        
        if curl -f -s $HEALTH_URL > /dev/null; then
            echo "$(date): Health check passed" >> $LOG_FILE
            exit 0
        else
            echo "$(date): Health check failed" >> $LOG_FILE
            exit 1
        fi
        EOF
        sudo chmod +x /usr/local/bin/zulip-health-check

    - name: Setup health check cron job
      run: |
        echo "*/5 * * * * /usr/local/bin/zulip-health-check" | sudo crontab -

    - name: Generate realm creation link
      run: |
        cd /home/zulip/zulip-server
        sudo -u zulip /home/zulip/zulip-py3-venv/bin/python manage.py generate_realm_creation_link

    - name: Deployment summary
      run: |
        echo "## Zulip Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "- **Status**: Successfully deployed" >> $GITHUB_STEP_SUMMARY
        echo "- **Environment**: ${{ github.event.inputs.environment || 'production' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Server**: ${{ secrets.ZULIP_URI_SCHEME || 'http' }}://${{ secrets.ZULIP_EXTERNAL_HOST || 'localhost' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Admin User**: ${{ secrets.ADMIN_USERNAME || 'admin' }} / ${{ secrets.ADMIN_PASSWORD || 'admin123' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Database**: ${{ secrets.DB_HOST }}:${{ secrets.DB_PORT || '5432' }}/${{ secrets.DB_NAME }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Backup**: Configured daily at 2 AM" >> $GITHUB_STEP_SUMMARY
        echo "- **Health Check**: Every 5 minutes" >> $GITHUB_STEP_SUMMARY