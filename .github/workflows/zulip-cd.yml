name: Deploy Zulip (self-hosted)

on:
  push:
    branches: [ dev ]
    paths-ignore:
      - "README.md"
      - ".github/**"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch/tag/commit to deploy (defaults to pushed ref)"
        required: false
        default: ""
      health_timeout:
        description: "Health check timeout (seconds)"
        required: false
        default: "60"

permissions:
  contents: read

concurrency:
  group: zulip-prod-deploy
  cancel-in-progress: true

env:
  ZULIP_DEPLOY_DIR: /home/zulip/deployments/current
  ZULIP_HOST: dev.zulip.xandylearning.in

jobs:
  deploy:
    runs-on: [self-hosted, zulip-prod]
    timeout-minutes: 45

    defaults:
      run:
        shell: bash

    steps:
      - name: Show trigger
        run: |
          echo "Triggered by: $GITHUB_EVENT_NAME"
          echo "Repo: $GITHUB_REPOSITORY"
          echo "Ref from event: $GITHUB_REF_NAME"

      - name: Determine ref to deploy
        id: pickref
        run: |
          REF_INPUT="${{ github.event.inputs.ref }}"
          if [[ -n "$REF_INPUT" ]]; then
            echo "ref=$REF_INPUT" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
          echo "Deploying ref: $(cat $GITHUB_OUTPUT)"

      - name: Preflight — ensure 2G swap if RAM < 5G
        run: |
          set -euo pipefail
          mem_mb=$(awk '/MemTotal/ {print int($2/1024)}' /proc/meminfo)
          if (( mem_mb < 5120 )); then
            if ! swapon --show | grep -q '^/swapfile'; then
              sudo fallocate -l 2G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=2048
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
              if ! grep -q '^/swapfile ' /etc/fstab; then
                echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
              fi
              echo "Swap created:"; swapon --show
            else
              echo "Swap already present:"; swapon --show
            fi
          else
            echo "RAM >= 5G; skipping swap."; free -h
          fi

      - name: Preflight — nginx sanity & fragments
        run: |
          set -euo pipefail
          if [[ -L /etc/nginx/sites-enabled/zulip-enterprise ]] && \
             [[ "$(readlink -f /etc/nginx/sites-enabled/zulip-enterprise)" == "/etc/nginx/sites-available/zulip-enterprise" ]]; then
            echo "Removing duplicate /etc/nginx/sites-enabled/zulip-enterprise"
            sudo rm -f /etc/nginx/sites-enabled/zulip-enterprise || true
          fi
          if [[ ! -L /etc/nginx/sites-enabled/zulip ]]; then
            echo "Creating primary site symlink -> zulip-enterprise"
            sudo ln -s /etc/nginx/sites-available/zulip-enterprise /etc/nginx/sites-enabled/zulip
          fi
          need_puppet=0
          for f in /etc/nginx/zulip-include/trusted-proto /etc/nginx/zulip-include/s3-cache /etc/nginx/zulip-include/upstreams; do
            [[ -e "$f" ]] || { echo "Missing: $f"; need_puppet=1; }
          done
          if (( need_puppet )); then
            echo "Running zulip-puppet-apply to restore nginx include fragments..."
            sudo /home/zulip/deployments/current/scripts/zulip-puppet-apply || true
          fi
          
          # Check for duplicate resolver directives and fix them
          for include_file in /etc/nginx/zulip-include/*; do
            if [[ -f "$include_file" ]]; then
              resolver_count=$(grep -c "^[[:space:]]*resolver" "$include_file" 2>/dev/null || true)
              if (( resolver_count > 1 )); then
                echo "Found $resolver_count resolver directives in $(basename "$include_file"), fixing..."
                # Create temp file with only the first resolver directive
                sudo awk '/^[[:space:]]*resolver/ && !seen {seen=1; print; next} !/^[[:space:]]*resolver/ {print}' \
                  "$include_file" > "/tmp/$(basename "$include_file")-fixed"
                sudo mv "/tmp/$(basename "$include_file")-fixed" "$include_file"
                echo "Fixed duplicate resolver directives in $(basename "$include_file")"
              fi
            fi
          done
          
          sudo nginx -t

      - name: Configure external PostgreSQL (optional)
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_SSL_MODE: ${{ secrets.DB_SSL_MODE }}
        run: |
          # This step configures external PostgreSQL by:
          # 1. Setting postgres_password in zulip-secrets.conf if provided
          # 2. Setting database_name and database_user in zulip.conf 
          # 3. Setting REMOTE_POSTGRES_HOST, REMOTE_POSTGRES_PORT, and REMOTE_POSTGRES_SSLMODE in settings.py
          # The DATABASES dict is automatically configured by computed_settings.py
          # SSL mode defaults to 'disable' - use 'require' or 'verify-full' for secure connections
          set -euo pipefail
          # Skip if no DB_HOST is configured
          if [[ -z "${DB_HOST:-}" ]]; then
            echo "No external PostgreSQL configured, skipping..."
            exit 0
          fi
          port="${DB_PORT:-5432}"
          name="${DB_NAME:-zulip}"
          user="${DB_USER:-zulip}"
          ssl_mode="${DB_SSL_MODE:-disable}"
          if [[ -n "${DB_PASSWORD:-}" ]]; then
            sudo sed -i '/^postgres_password/d' /etc/zulip/zulip-secrets.conf
            echo "postgres_password = ${DB_PASSWORD}" | sudo tee -a /etc/zulip/zulip-secrets.conf
          fi
          # Configure external PostgreSQL via zulip.conf and settings.py
          sudo python3 - "$DB_HOST" "$port" "$name" "$user" "$ssl_mode" <<'PY'
          import configparser, pathlib, sys
          
          # Update zulip.conf with database settings
          conf_path = pathlib.Path('/etc/zulip/zulip.conf')
          config = configparser.RawConfigParser()
          config.read(str(conf_path))
          
          if not config.has_section('postgresql'):
              config.add_section('postgresql')
          
          config.set('postgresql', 'database_name', sys.argv[3])
          config.set('postgresql', 'database_user', sys.argv[4])
          
          with open(str(conf_path), 'w') as f:
              config.write(f)
          
          # Update settings.py with remote host configuration
          settings_path = pathlib.Path('/etc/zulip/settings.py')
          s = settings_path.read_text()
          BEGIN, END = '# --- BEGIN CI MANAGED DB ---', '# --- END CI MANAGED DB ---'
          block = f"""{BEGIN}
          # External PostgreSQL configuration
          REMOTE_POSTGRES_HOST = "{sys.argv[1]}"
          REMOTE_POSTGRES_PORT = {sys.argv[2]}
          REMOTE_POSTGRES_SSLMODE = "{sys.argv[5]}"
          {END}
          """
          if BEGIN in s and END in s:
              s = s.split(BEGIN)[0] + block + s.split(END,1)[1]
          else:
              s += "\n" + block
          settings_path.write_text(s)
          PY

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy from fork via Zulip script
        run: |
          set -euo pipefail
          REF="${{ steps.pickref.outputs.ref }}"
          echo "Starting upgrade-zulip-from-git $REF"
          sudo ${ZULIP_DEPLOY_DIR}/scripts/upgrade-zulip-from-git "$REF" | sudo tee /tmp/zulip_upgrade.log

      - name: Post-deploy nginx fix (if needed)
        if: always()
        run: |
          set -euo pipefail
          # Check if nginx is running, if not try to fix config issues
          if ! sudo systemctl is-active --quiet nginx; then
            echo "nginx is not running, checking for config issues..."
            
            # Fix duplicate resolver directives again (in case they were recreated)
            for include_file in /etc/nginx/zulip-include/*; do
              if [[ -f "$include_file" ]]; then
                resolver_count=$(grep -c "^[[:space:]]*resolver" "$include_file" 2>/dev/null || true)
                if (( resolver_count > 1 )); then
                  echo "Found $resolver_count resolver directives in $(basename "$include_file"), fixing..."
                  sudo awk '/^[[:space:]]*resolver/ && !seen {seen=1; print; next} !/^[[:space:]]*resolver/ {print}' \
                    "$include_file" > "/tmp/$(basename "$include_file")-fixed"
                  sudo mv "/tmp/$(basename "$include_file")-fixed" "$include_file"
                  echo "Fixed duplicate resolver directives in $(basename "$include_file")"
                fi
              fi
            done
            
            # Test nginx config and restart if valid
            if sudo nginx -t; then
              echo "nginx config is now valid, restarting..."
              sudo systemctl restart nginx
            else
              echo "nginx config still has issues, will be handled by next step"
            fi
          else
            echo "nginx is running properly"
          fi

      - name: Process health (supervisor)
        run: |
          set -e
          sudo supervisorctl status
          bad=$(sudo supervisorctl status | awk '$2!="RUNNING"{print}')
          if [[ -n "$bad" ]]; then
            echo "Some processes not RUNNING:"; echo "$bad"; exit 1; fi

      - name: HTTP health check
        run: |
          set -euo pipefail
          timeout="${{ github.event.inputs.health_timeout || '60' }}"
          end=$((SECONDS + timeout))
          ok=0
          while (( SECONDS < end )); do
            if curl -fsS -k "https://127.0.0.1/" >/dev/null 2>&1 \
            && curl -fsS -k "https://127.0.0.1/static/version.json" >/dev/null 2>&1 \
            && curl -fsS -k "https://127.0.0.1/health" >/dev/null 2>&1; then
              ok=1; break
            fi
            sleep 2
          done
          if [[ "$ok" -ne 1 ]]; then echo "HTTP health check failed"; exit 1; fi

      - name: Save logs (always)
        if: always()
        run: |
          echo "::group::/var/log/zulip/upgrade.log"; sudo tail -n 200 /var/log/zulip/upgrade.log || true; echo "::endgroup::"
          echo "::group::/tmp/zulip_upgrade.log"; sudo cat /tmp/zulip_upgrade.log || true; echo "::endgroup::"

      - name: Rollback on failure
        if: failure()
        run: |
          set -euo pipefail
          prev=$(sudo ls -1dt /home/zulip/deployments/* 2>/dev/null | sed -n '2p' || true)
          if [[ -z "$prev" ]]; then 
            echo "No previous deployment found for rollback"
            exit 1
          fi
          echo "Rolling back to: $prev"
          sudo ln -sfn "$prev" /home/zulip/deployments/current
          sudo ${prev}/scripts/restart-server
